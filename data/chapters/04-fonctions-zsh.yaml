    explanation: clip fait partie des fonctions ZSH detectees.
  - id: slug
    type: function
    exercise_type: scenario
    prompt: Tu veux transformer un titre en identifiant lisible pour fichier ou URL. Quelle fonction detectee utilises-tu ?
    answer:
