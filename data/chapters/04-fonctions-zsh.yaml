  - id: funclist
    type: function
    exercise_type: scenario
    prompt: Tu veux lister tes fonctions shell utiles. Quelle fonction detectee cherches-tu ?
    answer:
      primary: funclist
    explanation: funclist aide a retrouver les fonctions disponibles.
  - id: clip
    type: function
    exercise_type: free-answer
    prompt: Quelle fonction detectee evoque la copie vers le presse-papiers ?
    answer:
